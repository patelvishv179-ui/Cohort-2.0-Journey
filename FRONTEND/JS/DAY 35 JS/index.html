    // Ask the user to enter numbers repeatedly until they type -1.
// Find and print:
// The average of all positive numbers entered
// The count of numbers divisible by 3
// Conditions:
// -1 is only a stop signal and must not be included in any calculation
// 0 should be ignored completely
// Negative numbers (except -1) should not be included in the average
// At least one positive number will be entered before -1
let sum = 0;
let avgCount = 0;
let div3Count = 0;

while (true) {
    let num = Number(prompt("Enter a number (-1 to stop):"));

    if (num === -1) {
        break;
    }

    if (num === 0) {
        continue;
    }

    if (num > 0) {
        sum += num;
        avgCount++;
    }

    if (num % 3 === 0) {
        div3Count++;
    }
}

let average = sum / avgCount;

console.log("Average of positive numbers is: " + average);
console.log("Count of numbers divisible by 3 is: " + div3Count);
