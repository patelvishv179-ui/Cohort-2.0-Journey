    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form and Form Validations</title>
    </head>
    <style>
        span{
            color: red;
            font-size: 16px;
        }
        .hide{
            display: none;
        }
    </style>
    <body>
        
        <form>

            <input type="text" placeholder="Name" id="name" required>
                  <div class="hide">   
                  <span>Your name must should be required 2 character</span>
            </div>
            <br><br>
      
            <input type="email" placeholder="Email"><br><br>
            <input type="password" placeholder="password"><br><br>

            <pre style="display: inline-block;">Select your Occupation:  </pre>

            <select>

                <option>Worker</option>
                <option>Student</option>

            </select> <br><br>

            <textarea placeholder="Tell about you"></textarea><br><br>

            <input type="submit" value="Submit">

        </form>

        <script>

        //Reading Value from input,select and textarea
        let name = document.querySelector("#name");
        let form = document.querySelector("form");
        let nameerr = document.querySelector(".hide");

        form.addEventListener("submit", function(evt){

            evt.preventDefault();
            
            if(name.value.length < 2){
                nameerr.style.display = "inline-block";
            }
            else{
                nameerr.style.display = "none";
            }

        });

        </script>

    </body>
    </html>
