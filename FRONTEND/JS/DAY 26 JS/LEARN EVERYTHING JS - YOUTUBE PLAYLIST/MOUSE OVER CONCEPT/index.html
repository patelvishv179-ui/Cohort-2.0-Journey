<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Over</title>
    <style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,body{
    height: 100%;
    width: 100%;
}

main {
    height:100%;
    width:100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: rgb(66, 60, 47);
    overflow: hidden;
    position: relative;
}

.card{
position: absolute;
    background-color: lightblue;
    border: none;
    outline: none;
    height: 20px;
    width: 20px;
    border-radius: 50%;
    transition: all cubic-bezier(0.19, 1, 0.22, 1) 1s;
}

.over{

    transform: translateY(-10px);
    transition: transform 1s ease-in-out;

}

.leave{

    transform: translateY(0px);
    transition: transform 1s ease-in-out;

}

    </style>
</head>
<body>
    
    <main>

    <div class="card"></div>
           
    <script src="./script.js"></script>

    </main>
 

</body>
</html>
