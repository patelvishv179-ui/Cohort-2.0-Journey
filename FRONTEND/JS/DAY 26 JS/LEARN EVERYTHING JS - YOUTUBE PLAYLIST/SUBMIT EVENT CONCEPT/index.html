<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css"
    rel="stylesheet"
/>
    <style>

        body{
            background-color: #222;
            color: white;
        }

        form{
            padding: 20px;
            background-color: #444;
            max-width: 300px;
            border-radius: 20px;
            display: flex;
            /* justify-content: center; */
            flex-direction: column;
            align-items: center;
        }

        input{
            display: block;
            margin-top: 1rem;
            padding: 0.4rem;
        }

        h4{
            text-align: center;
            font-weight: 100;
        }

        .card{            
            
            padding: 20px;
            background-color: #4d2626;
            max-width: 300px;
            border-radius: 20px;
            display: flex;
            /* justify-content: center; */
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            visibility: hidden;
            /* overflow: hidden; */

        }

        .card img{
            object-fit: cover;
            height: 100%;
            width: 100%;
            /* border-radius: 40px; */
        }

        .profile{
            border-radius: 50%;
            height: 80px;
            width: 80px;
            overflow: hidden;
        }

        i{
            font-size: 30px;
            color: wheat;
            margin-left: 200px;
            cursor: pointer;

        }

    </style>
</head>
<body>
    
    <form>
        <h4>Form</h4>
        <input type="text" placeholder="Enter Name">
        <input type="email" placeholder="Enter Email">
        <input type="text" placeholder="Enter Proffesion">
        <input type="text" placeholder="Enter Profile pic Url">
           
        <input type="submit" value="Submit">
    </form>

    <div class="card">

        <i class="ri-close-line" id="cancle"></i>

        <h2>Submitted Details</h2>

        <div class="profile">

            <img src="https://i.pinimg.com/474x/cf/8b/d1/cf8bd1753d3cf639a6ee1bf4916e8d97.jpg" alt="">

        </div>

        <h3>Vishv</h3>

        <h4 id="Proffesion">Proffesion</h4>

        <h5>Email</h5>

    </div>

    <script src="script.js"></script>

</body>
</html>
