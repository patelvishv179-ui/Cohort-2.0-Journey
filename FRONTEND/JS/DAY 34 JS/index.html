<body>
    <script>


    //Allow only 3 attempts enter correct password if user gets it right early , stop. if not ->  Account Locked

    let correctpassword = "Vishv@123";
    let attempt = 3;
    let takenpass = null;
    while(attempt > 0){
        takenpass = prompt(`Enter Password:\nAttempt left:${attempt}`);       
        if(takenpass !== correctpassword){
            attempt--;
            console.log("Incorrect Passowrd");
        }
        if(takenpass === correctpassword){
            console.log("Password Matched");
            break;
        }
    }

    if(attempt===0){console.log("Account Locked");}

    </script>
</body>
</html>
